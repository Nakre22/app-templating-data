  why: Face à la complexité croissante des équipements industriels et à la pénurie
    persistante de main-d'œuvre qualifiée, l'industrie doit simplifier et accélérer
    l'accès à une documentation technique exhaustive. Les opérateurs et techniciens
    ont besoin d'obtenir rapidement des réponses fiables, contextualisées et exploitables
    à partir de documents techniques souvent volumineux, hétérogènes et multimodaux.
  what: 'OPTICONFORM explore des Small Language Models (SLMs) robustes, légers et
    fiables, capables d''intégrer efficacement des informations multimodales : textes,
    images, schémas et tableaux. L''objectif est de fournir, à partir d''une question
    ou d''une image, des réponses précises et contextualisées issues de documents
    techniques industriels.'
  how: Le projet combine des techniques avancées de compression de modèles, notamment
    la distillation et l'élagage, avec une calibration rigoureuse fondée sur la prédiction
    conforme. Cette approche permet d'associer à chaque prédiction un niveau de confiance
    explicite, afin d'aider les opérateurs industriels à prendre des décisions plus
    fiables. OPTICONFORM évalue aussi les limites de réduction des modèles et l'extension
    de leurs capacités à traiter des entrées visuelles avec un faible coût computationnel.
projecttracks:
  title: Project Tracks
  items:
  - name: Track 1 — Documentation technique industrielle multimodale
    description: 'Cet axe vise à exploiter des documents techniques industriels contenant
      plusieurs types d''informations : texte, images, schémas, plans et tableaux.
      L''objectif est de rendre ces contenus plus accessibles aux opérateurs à partir
      de requêtes simples ou d''entrées visuelles.'
  - name: Track 2 — Small Language Models robustes, légers et fiables
    description: Cet axe porte sur l'exploration de SLMs capables de produire des
      réponses contextualisées tout en restant frugaux en ressources matérielles.
      Le projet étudie notamment la compression de modèles par distillation et élagage
      afin de conserver la performance tout en réduisant le coût de calcul.
  - name: Track 3 — Calibration et confiance par prédiction conforme
    description: Cet axe introduit une approche de calibration basée sur la prédiction
      conforme. L'objectif est d'associer aux réponses générées un niveau de confiance
      explicite, afin de renforcer la fiabilité des décisions prises par les utilisateurs
      industriels.
  - name: Track 4 — Évaluation pour un usage industriel
    description: 'Cet axe vise à évaluer les limites de réduction des modèles, leur
      capacité à traiter des entrées visuelles et leur pertinence pour une nouvelle
      génération de systèmes industriels intelligents : précis, rapides, fiables et
      frugaux.'
