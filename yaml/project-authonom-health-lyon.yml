documents:
  description: All publications are available open-access on <a href="https://hal.science/"
    target="_blank" rel="noopener noreferrer">HAL Science</a>. <img src="/api/data/Logoahealth.png"
    alt="logo" class="img-align-right"> Internal reports and project deliverables
    are accessible to partners upon request. For preprints or collaboration inquiries,
    <a href="mailto:contact@authonom-health.fr" target="_blank" rel="noopener noreferrer">contact
    us</a>.
  image: /api/data/Logoahealth.png
  title: Documents & Publications
  items:
  - name: Complexity Landscape for Local Certification
    type: Conference Paper
    author: N. Bousquet - L. Feuilloley - S. Zeitoun
    venue: DISC 2025 (Best Paper Award)
    abstract: Winner of the Best Paper Award at DISC 2025. This article establishes
      the complexity classes for local certification in distributed graphs. It proves
      new bounds for property verification without global knowledge of the network
      structure.
    description: This paper underpins our distributed health monitoring architecture.
      The full article and supplementary proofs are freely available on <a href="https://arxiv.org/pdf/2505.20915"
      target="_blank" rel="noopener noreferrer">arXiv</a> and indexed on <a href="https://hal.science/"
      target="_blank" rel="noopener noreferrer">HAL</a>.
    link: https://arxiv.org/pdf/2505.20915
  - _type: text
    content: <img src="/api/data/Logoahealth.png" class="img-align-left" width="64">
      The publications below span <strong>theoretical computer science</strong> and
      <strong>applied digital health</strong>. They reflect collaborative work with
      <a href="https://inria.fr/" target="_blank" rel="noopener noreferrer">Inria</a>,
      <a href="https://cnrs.fr/" target="_blank" rel="noopener noreferrer">CNRS</a>,
      and international partners.<br><br>Researchers with institutional access can
      request full author copies via <a href="https://hal.science/" target="_blank"
      rel="noopener noreferrer">HAL Open Archive</a>.
  - name: Sobol Sequences with 2D Projections
    type: Journal Paper
    author: N. Bonneel - D. Coeurjolly - J-C. Iehl
    venue: ACM Transactions on Graphics 2025
    abstract: This research proposes a new method to generate Sobol sequences with
      guaranteed quality for 2D projections, optimizing rendering calculations in
      computer graphics.
    link: https://hal.science/hal-05125221
  - name: 'XREcho: XR User Behavior Visualization'
    type: Technical Report
    author: S. Villenave - F. Dupont - G. Lavoué
    venue: MMSys Conference
    abstract: Presentation of XREcho, an open-source Unity plugin developed at LIRIS.
      It allows researchers to record, replay, and visualize user interactions during
      Virtual Reality sessions for behavioral analysis.
    link: https://hal.science/hal-03777913/document
  - name: Visualisation Interactive de Données
    type: Research Report
    author: Romain Vuillemot
    venue: Habilitation (HDR) 2024
    abstract: Habilitation thesis defended at Lyon 1. It explores new design spaces
      for interactive data visualization, focusing on how to structure and navigate
      complex datasets on the web and mobile devices.
    link: https://hal.science/tel-04732104/document
  - name: Project Graphic Charter & Guidelines
    type: General
    author: Communication Dept.
    venue: Internal Draft (v1.0)
    abstract: This document details the typography, color palettes, and logo usage
      rules for all project publications. It is intended for internal use only to
      ensure visual consistency across presentations.
    link: /api/data/Projettest.pdf
software:
  description: Our software is developed under open-source licenses and hosted on
    <a href="https://forge.univ-lyon1.fr" target="_blank" rel="noopener noreferrer">Forge
    Lyon 1</a>. Contributions and issue reports are welcome. Contact the team before
    forking for commercial use.
  title: Software & Tools
  items:
  - name: MIF01 - Software Engineering
    author: M. Moy & L. Medini (Lyon 1)
    abstract: Official repository for the M1IF01 course at University Claude Bernard
      Lyon 1. It contains all educational resources, Java/Maven code skeletons for
      labs, and tutorials for Continuous Integration (CI/CD) on GitLab. The project
      covers Agile methodologies, Design Patterns, and software development best practices.
    download: https://forge.univ-lyon1.fr/matthieu.moy/mif01
  - name: M1IF03 - Web Architecture
    author: Pedagogical Team (Lyon 1)
    abstract: Base repository for the 2025 Web Architecture course. It provides the
      initial project structure for developing Java EE applications using Servlets
      and JSP. This skeleton is configured with Maven and is designed to be deployed
      on an Apache Tomcat server.
    download: https://forge.univ-lyon1.fr/m1if03/m1if03-2025-base
  - name: Research Data Archive (ZIP)
    author: Team BD
    abstract: This archive contains the complete source code and supplementary datasets
      required for local deployment. It includes pre-compiled binaries, configuration
      files, and comprehensive documentation. Refer to the README.md file for detailed
      installation instructions.
    download: /api/data/Projettest.zip
