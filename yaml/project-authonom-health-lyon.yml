home:
  logo: /api/data/Logohealthv2.png
  logo_align: left
  logo_width: '180'
  why: Western populations face an increase of longevity <a href="https://hal.science/"
    target="_blank" rel="noopener noreferrer">HAL Science</a> which mechanically increases
    the number of chronic disease patients to manage. Current healthcare strategies
    will not allow to maintain a high level of care with a controlled cost in the
    future and E health can optimize the management and costs of our health care systems.
    Healthy behaviors contribute to prevention and optimization of chronic diseases
    management, but their implementation is still a major challenge. Digital technologies
    could help their implementation through numeric behavioral medicine programs to
    be developed in complement to the existing care in order to focus human interventions
    on the most severe cases.
  what: 'The above-mentioned challenges will be disentangled with the following specific
    goals: (1) Implement large-scale diagnostic evaluations and behavioral interventions
    on healthy subjects and chronic disease patients using virtual Socially Interactive
    Agents, smartphones and wearable sensors. (2) Optimize clinical phenotyping by
    collecting and analyzing non-intrusive data (voice, geolocation, body motion,
    smartphone footprints). (3) Better understand psychological, economical, and socio-cultural
    factors driving acceptance and engagement with autonomous digital technologies.
    (4) Improve interaction modalities to personalize and optimize long-term engagement
    of users. (5) Organize large scale data collection and interoperability with existing
    datasets to generate multidimensional predictive models.'
  how: This project will rely on population-based interventions in existing numeric
    cohorts (KANOPEE) where virtual agents interact with patients at home on a regular
    basis. Pilot hospital departments will also be involved for data management supervised
    by information and decision systems coordinating autonomous digital Cognitive
    Behavioral interventions based on our SIA (Socially Interactive Agents). The global
    solution based on empathic Human-Computer Interactions will help targeting, diagnose
    and treat subjects suffering from dysfunctional behavioral issues. The expected
    benefits include increased adherence to treatment, strong self-empowerment to
    improve autonomy and a reduction of long-term risks for subjects and patients.
projecttracks:
  title: Project Tracks
  items:
  - name: Track 1 - Health Monitoring
    description: Real-time monitoring of health indicators using wearable sensors
      and smartphones. Ecological and non-intrusive data collection from daily activities.
  - name: Track 2 - Behavioral Interventions
    description: Development of numeric behavioral medicine programs using Socially
      Interactive Agents (SIAs). Personalized cognitive behavioral interventions delivered
      digitally.
  - name: Track 3 - Clinical Phenotyping
    description: Analysis of non-intrusive biomarkers to complement clinical data.
      Voice, geolocation and motion analysis for patient cohort enrichment.
  - name: Track 4 - Data & Interoperability
    description: Large-scale data collection and interoperability with existing biobanks
      and epidemiological cohorts. Generation of multidimensional predictive models
      for diagnosis and treatment.
